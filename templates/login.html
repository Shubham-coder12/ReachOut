<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — ReachOut</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a; --dark: #111; --card: #161616;
      --border: #2a2a2a; --mid: #444; --muted: #888;
      --light: #ccc; --white: #f5f5f5;
    }

    body {
      background: var(--black); color: var(--white);
      font-family: 'DM Sans', sans-serif; min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* Canvas background */
    #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .wrapper {
      position: relative; z-index: 1;
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
    }

    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 44px 40px;
      width: 100%; max-width: 400px;
    }

    .login-icon {
      font-size: 2rem; text-align: center; margin-bottom: 20px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem; font-weight: 400;
      text-align: center; margin-bottom: 6px;
    }
    h1 em { font-style: italic; color: var(--muted); }

    .subtitle {
      font-size: 0.82rem; color: var(--muted);
      text-align: center; margin-bottom: 32px;
    }

    .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .field label {
      font-size: 0.72rem; font-weight: 600; color: var(--light);
      text-transform: uppercase; letter-spacing: 0.8px;
    }

    .pass-wrap { position: relative; }
    .field input {
      width: 100%;
      background: var(--dark); border: 1px solid var(--border);
      border-radius: 8px; color: var(--white);
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      padding: 12px 44px 12px 16px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input::placeholder { color: var(--mid); }
    .field input:focus {
      border-color: var(--muted);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
    }
    .field input.error-input { border-color: #f87171; }

    /* Show/hide password toggle */
    .toggle-pass {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--mid); font-size: 1rem;
      transition: color 0.2s;
    }
    .toggle-pass:hover { color: var(--light); }

    .error-msg {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: #f87171; border-radius: 8px;
      padding: 10px 14px; font-size: 0.82rem;
      margin-bottom: 18px; text-align: center;
    }

    .btn-login {
      width: 100%; background: var(--white); color: var(--black);
      border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600;
      padding: 13px; cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-login:hover { background: #e0e0e0; }
    .btn-login:active { transform: scale(0.99); }

    .back-link {
      display: block; text-align: center; margin-top: 20px;
      font-size: 0.78rem; color: var(--muted); text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--white); }

    @media (max-width: 480px) {
      .login-box { padding: 32px 24px; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="wrapper">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <h1>Admin <em>Login</em></h1>
    <p class="subtitle">Enter the admin password to continue</p>

    {% if error %}
    <div class="error-msg">❌ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/admin-login">
      <div class="field">
        <label for="password">Password</label>
        <div class="pass-wrap">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter admin password"
            autocomplete="current-password"
            {% if error %}class="error-input"{% endif %}
            autofocus
          />
          <button type="button" class="toggle-pass" onclick="togglePass()" id="toggle-btn">👁</button>
        </div>
      </div>
      <button type="submit" class="btn-login">Login →</button>
    </form>

    <a class="back-link" href="/">← Back to Contact Form</a>
  </div>
</div>

<script>
  // Canvas background
  (function () {
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    function makeP(n) {
      return Array.from({ length: n }, () => ({
        x: Math.random()*W, y: Math.random()*H, r: 1+Math.random()*1.5,
        dx: (Math.random()-.5)*.3, dy: (Math.random()-.5)*.3, a: .08+Math.random()*.2
      }));
    }
    function draw() {
      ctx.clearRect(0,0,W,H);
      // grid
      ctx.strokeStyle='rgba(255,255,255,0.025)'; ctx.lineWidth=1;
      for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
      // particles
      particles.forEach(p=>{
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${p.a})`; ctx.fill();
        p.x+=p.dx; p.y+=p.dy;
        if(p.x<0)p.x=W; if(p.x>W)p.x=0;
        if(p.y<0)p.y=H; if(p.y>H)p.y=0;
      });
      requestAnimationFrame(draw);
    }
    resize(); particles=makeP(50);
    window.addEventListener('resize',()=>{resize();particles=makeP(50);});
    draw();
  })();

  // Toggle password visibility
  function togglePass() {
    const inp = document.getElementById('password');
    const btn = document.getElementById('toggle-btn');
    if (inp.type === 'password') {
      inp.type = 'text'; btn.textContent = '🙈';
    } else {
      inp.type = 'password'; btn.textContent = '👁';
    }
  }

  // Submit on Enter
  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') this.closest('form').submit();
  });
</script>
</body>
</html>
